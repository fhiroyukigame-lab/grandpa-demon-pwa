<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#16120f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="じいさん魔王討伐" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>じいさん、魔王倒してきて。</title>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>じいさん、魔王倒してきて。</h1>
        <p class="sub">武器屋の店主を鍛えて魔王を倒せ！</p>
      </div>
      <div class="gold">💰 <span id="gold">0</span> G</div>
    </header>

    <section class="hero card">
      <div class="portrait">🧙‍♂️</div>
      <div class="hero-info">
        <h2>武器屋のじいさん Lv.<span id="level">1</span></h2>
        <div class="statline"><span>HP</span><b id="hpStat"></b></div>
        <div class="statline"><span>攻撃</span><b id="atkStat"></b></div>
        <div class="statline"><span>防御</span><b id="defStat"></b></div>
        <div class="statline"><span>速度</span><b id="spdStat"></b></div>
        <div class="statline"><span>会心</span><b id="critStat"></b></div>
        <div class="statline"><span>回避</span><b id="evaStat"></b></div>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="shop">武器屋</button>
      <button class="tab" data-tab="equip">装備</button>
      <button class="tab" data-tab="battle">魔王城</button>
    </nav>

    <section id="shop" class="panel active"></section>

    <section id="equip" class="panel">
      <div class="card">
        <h3>現在の装備</h3>
        <div id="equipSlots" class="equip-grid"></div>
      </div>
      <div class="card">
        <h3>所持品</h3>
        <div id="inventory"></div>
      </div>
    </section>

    <section id="battle" class="panel">
      <div class="card floor-card">
        <h3>魔王城</h3>
        <p>最高到達階：<b><span id="maxFloor">0</span>階</b></p>
        <div class="floor-controls">
          <button id="minusFloor">−</button>
          <div><span id="selectedFloor">1</span>階</div>
          <button id="plusFloor">＋</button>
        </div>
        <button id="startBattle" class="primary">この階へ出撃</button>
      </div>

      <div id="battleArea" class="card battle-card hidden">
        <div class="fighters">
          <div class="fighter">
            <div class="avatar">🧙‍♂️</div>
            <b>じいさん</b>
            <div class="hpbar"><span id="playerHpBar"></span></div>
            <small id="playerHpText"></small>
          </div>
          <div class="vs">VS</div>
          <div class="fighter">
            <div class="avatar" id="enemyAvatar">👹</div>
            <b id="enemyName">敵</b>
            <div class="hpbar enemy"><span id="enemyHpBar"></span></div>
            <small id="enemyHpText"></small>
          </div>
        </div>
        <div class="skills">
          <button id="skillPower">🔥 本気を出す</button>
          <button id="skillDodge">👁 長年の勘</button>
          <button id="skillThrow">⚔ 店の商品じゃ！</button>
        </div>
        <div id="battleLog" class="log"></div>
      </div>
    </section>

    <footer>
      <button id="resetSave" class="danger ghost">セーブデータ初期化</button>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
